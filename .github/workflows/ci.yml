name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — run the Django test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-dummy-secret-key-not-used-in-prod
          DATABASE_URL: sqlite:///db.sqlite3
        run: pytest tests/ -q --tb=short -m "not slow"

  # ---------------------------------------------------------------------------
  # Job 2 — scan Python dependencies for known CVEs
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-django.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Django dependencies
        run: pip-audit -r backend/requirements-django.txt

  # ---------------------------------------------------------------------------
  # Job 3 — static security analysis
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Scan Django source
        # -ll = Medium severity and above only; -r = recursive
        # Exclude tests/ — test code intentionally uses patterns bandit flags
        run: bandit -r backend/apps/ backend/core/ -ll --exclude backend/tests/

  # ---------------------------------------------------------------------------
  # Job 4 — verify the Docker image builds cleanly
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 5 — Playwright E2E tests (frontend)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 6 — deploy to Railway (push to main only, after all checks pass)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy to Railway
    needs: [test, audit, bandit, docker-build, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        # --detach returns immediately; Railway streams logs in its dashboard.
        # Health check at /health/ must return 200 within 60s or Railway rolls back.
        # RAILWAY_SERVICE is a GitHub Actions variable (not secret) — set it to the
        # Railway service name (e.g. "sync-safe-backend") in repo Settings → Variables.
        working-directory: backend
        run: railway up --service ${{ vars.RAILWAY_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 7 — deploy to Vercel (push to main only, after all checks pass)
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy to Vercel
    needs: [test, audit, bandit, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Vercel deploy hook
        # VERCEL_DEPLOY_HOOK_URL is a GitHub Actions secret — set it to the
        # deploy hook URL from Vercel project Settings → Git → Deploy Hooks.
        # The hook URL already encodes the target branch; no body required.
        run: curl -s --fail -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
